<div class="container mt-4">
  <div class="text-center mb-5">
    <h1 class="display-5 fw-bold text-primary">
      <i class="fa-solid fa-cart-shopping me-2"></i>
      Your Shopping Cart
    </h1>
    <hr class="w-25 mx-auto text-primary opacity-75" />
  </div>

  <div class="row g-4">
    @for (item of cartItems; track item.id) {
    <div class="col-md-6 col-lg-4 col-xl-3">
      <div
        class="card shadow-sm border-0 h-100 animate-scale"
        [class.removing]="item.isRemoving"
        [style.animationDelay]="$index * 0.1 + 's'"
      >
        <img
          [src]="'/assets/images/' + item.image"
          class="card-img-top rounded-top"
          style="height: 200px; object-fit: cover"
        />

        <div class="card-body d-flex flex-column justify-content-between">
          <h5 class="card-title text-primary fw-semibold text-center">
            {{ item.name }}
          </h5>

          <p class="card-text text-center mb-2">
            <span class="fw-semibold text-secondary">Price: </span>
            <span class="text-dark fw-bold">{{ item.price | currency }}</span>
          </p>

          <div class="d-flex justify-content-center align-items-center mb-2">
            <button
              class="btn btn-outline-secondary btn-sm me-2"
              (click)="decreaseQuantity(item)"
            >
              <i class="fa-solid fa-minus"></i>
            </button>
            <span class="fw-bold fs-5">{{ item.quantity }}</span>
            <button
              class="btn btn-outline-secondary btn-sm ms-2"
              (click)="increaseQuantity(item)"
            >
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>

          @if (stockWarnings.get(item.id)) {
          <div
            class="alert alert-warning text-center p-2 fw-semibold small mt-2"
          >
            Not enough stock available!
          </div>
          }

          <p class="text-center text-success fw-semibold fs-6 mt-2">
            Total: {{ item.price * item.quantity | currency }}
          </p>

          <button
            (click)="removeItem(item.id)"
            class="btn btn-outline-danger w-100 mt-auto"
          >
            <i class="fa fa-trash"></i> Remove
          </button>
        </div>
      </div>
    </div>
    }
  </div>

  <div
    class="my-5 d-flex flex-wrap align-items-center justify-content-between gap-5"
  >
    <div class="total-price-card flex-grow-1 shadow-lg p-4 rounded">
      <div class="d-flex justify-content-between align-items-center">
        <h4 class="mb-0 text-secondary">
          <i class="fa-solid fa-receipt me-2"></i>

          Total Price
        </h4>
        <h3 class="text-success mb-0">{{ totalPrice | currency }}</h3>
      </div>
    </div>

    <div class="clear-cart-btn-wrapper">
      <button (click)="clearCart()" class="btn btn-warning px-3 py-4">
        <i class="fa-solid fa-broom me-2"></i>

        Clear Cart
      </button>
    </div>
  </div>
</div>
