<div
  class="toast-container position-fixed top-0 end-0 p-3"
  style="z-index: 1080"
>
  <div
    #toastElem
    class="toast align-items-center text-bg-success border-0"
    role="alert"
    aria-live="assertive"
    aria-atomic="true"
  >
    <div class="d-flex">
      <div class="toast-body">
        {{ message }}
      </div>
      <button
        type="button"
        class="btn-close btn-close-white me-2 m-auto"
        (click)="hideToast()"
        aria-label="Close"
      ></button>
    </div>
  </div>
</div>
